<!DOCTYPE html>
<html>
<head><title>Generate RunIt Icons</title></head>
<body style="font-family:sans-serif;padding:20px;background:#0a1f1c;color:#e8f5f3">
<h2>RunIt Icon Generator</h2>
<p>Click the button to generate and save all PWA icons.</p>
<button id="btn" style="padding:12px 24px;background:#00c9a7;color:#0a1f1c;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer">
  Generate All Icons
</button>
<div id="log" style="margin-top:20px;font-size:13px;line-height:2"></div>

<canvas id="c" style="display:none"></canvas>

<script>
var sizes = [72, 96, 128, 144, 152, 192, 384, 512];
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var log    = document.getElementById('log');

function generateIcon(size) {
  canvas.width  = size;
  canvas.height = size;
  ctx.clearRect(0, 0, size, size);

  var r = size * 0.22;

  // Background rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#00c9a7';
  ctx.fill();

  // Letter R
  ctx.fillStyle = '#0a1f1c';
  ctx.font = 'bold ' + Math.round(size * 0.6) + 'px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('R', size / 2, size * 0.52);

  return canvas.toDataURL('image/png');
}

function downloadDataURL(dataURL, filename) {
  var a = document.createElement('a');
  a.href = dataURL;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

document.getElementById('btn').addEventListener('click', async function() {
  log.innerHTML = 'Generating icons...<br>';
  
  for (var i = 0; i < sizes.length; i++) {
    var size     = sizes[i];
    var filename = 'icon-' + size + '.png';
    var dataURL  = generateIcon(size);
    
    await new Promise(function(resolve) { setTimeout(resolve, 200); });
    downloadDataURL(dataURL, filename);
    log.innerHTML += '✓ ' + filename + '<br>';
  }
  
  log.innerHTML += '<br><strong style="color:#00c9a7">Done! Move all downloaded files to your runit-frontend/public/ folder.</strong>';
});
</script>
</body>
</html>
